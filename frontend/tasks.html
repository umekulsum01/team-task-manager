<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <h2>Team Task Manager</h2>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="projects.html">Projects</a>
      <a href="tasks.html">Tasks</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">

    <!-- Create Task Form (Admin Only) -->
    <div class="form-section" id="create-task-section">
      <h2>Create New Task</h2>
      <input type="text" id="task-title" placeholder="Task Title" />
      <textarea id="task-desc" placeholder="Task Description" rows="3"></textarea>
      <select id="task-project">
        <option value="">Select Project</option>
      </select>
      <select id="task-assignee">
        <option value="">Assign To</option>
      </select>
      <input type="date" id="task-due" />
      <button class="btn-add" onclick="createTask()">Create Task</button>
      <p id="task-msg" class="msg"></p>
    </div>

    <!-- Tasks List -->
    <div class="section">
      <h2>All Tasks</h2>
      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Project</th>
            <th>Assigned To</th>
            <th>Status</th>
            <th>Due Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tasks-list">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    checkAuth();
    loadTasks();
    loadProjectsForSelect();
    loadUsersForSelect2();
  </script>
</body>
</html>
